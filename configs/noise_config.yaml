noise_types:
  - no_accent
  - domain_abbreviation
  - teencode_colloquial
  - typo
  - elongation
  - mixed_noise

severity:
  low_max_changed_token_ratio: 0.2
  medium_max_changed_token_ratio: 0.4
  high_min_changed_token_ratio: 0.4

mixed_noise:
