# Stage 3 — PhoBERT clean fine-tuning configuration

project:
  data_dir: data/processed
  label_mapping_path: configs/label_mapping.json
  reports_tables_dir: reports/tables
  reports_figures_dir: reports/figures
  reports_notes_dir: reports/notes
  models_dir: models/phobert

model:
  model_name: vinai/phobert-base
  max_length: 128

preprocessing:
  # Keep false for the first reproducible clean run.
  # PhoBERT is designed for word-segmented Vietnamese, but segmentation setup
  # can introduce environment risk. The segmentation/tokenization analysis is
  # handled explicitly in later stages.
  word_segmentation_enabled: false
  word_segmentation_method: none

training:
  seed: 42
  learning_rate: 2.0e-5
  num_train_epochs: 4
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  weight_decay: 0.01
  warmup_ratio: 0.06
  logging_steps: 50
  evaluation_strategy: epoch
  save_strategy: epoch
  load_best_model_at_end: true
  metric_for_best_model: macro_f1
  greater_is_better: true
  fp16: true
  report_to: none

tasks:
  sentiment:
    text_column: text
    label_column: sentiment_label
    output_subdir: sentiment

  topic:
    text_column: text
    label_column: topic_label
    output_subdir: topic
